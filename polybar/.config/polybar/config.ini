[colors]
background = cc102127
background-alt = 5f6f75
foreground = c3c7c9
foreground-alt = c3c7c9
primary = d05f87

secondary = AD4F57
alert = 925764
disabled = c3c7c9
yellow = #f6d1ac

[bar/caspar]
monitor = ${env:MONITOR:}
width = 100%
height = 25pt
radius = 0

dpi = 80

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt
border-size = 0pt
border-color = #00000000

padding-left = 1
padding-right = 1
module-margin = 1

label-padding = 5 

separator = ‚ÄĘ
separator-foreground = ${colors.disabled}

font-0 = CaskaydiaCove Nerd Font;2
modules-left = xworkspaces  xwindow 
# downspeed
# eth
# xkeyboard
# player-online
# zeit 
# zeit-today
# filesystem
modules-right =  battery pulseaudio memory cpu xkeyboard wlan timer date

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

; monitor = eDP
; monitor = HDMI-A-0

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true
; This module is not active by default (to enable it, add it to one of the

; modules-* list above).

; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
pin-workspaces = true
index-sort = false
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/battery]
; see "man date" for details on how to format the time string
type = internal/battery

; This is useful in case the battery never reports 100% charge
; Default: 100
full-at = 99

; format-low once this charge percentage is reached
; Default: 10
; New in version 3.6.0
low-at = 10

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT1
adapter = ACAD

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 5
; NOTE: if you want to use syntax tags here you need to use %%{...}
; Default: %H:%M:%S
time-format = %H:%M

; Available tags:
;   <label-charging> (default)
;   <bar-capacity>
;   <ramp-capacity>
;   <animation-charging>
format-charging = <animation-charging> <label-charging>

; Available tags:
;   <label-discharging> (default)
;   <bar-capacity>
;   <ramp-capacity>
;   <animation-discharging>
format-discharging = <ramp-capacity> <label-discharging>

; Available tags:
;   <label-full> (default)
;   <bar-capacity>
;   <ramp-capacity>
;format-full = <ramp-capacity> <label-full>

; Format used when battery level drops to low-at
; If not defined, format-discharging is used instead.
; Available tags:
;   <label-low>
;   <animation-low>
;   <bar-capacity>
;   <ramp-capacity>
; New in version 3.6.0
; format-low = <label-low> <animation-low>

; Available tokens:
;   %percentage% (default) - is set to 100 if full-at is reached
;   %percentage_raw%
;   %time%
;   %consumption% (shows current charge rate in watts)
; label-charging = Charging %percentage%%
label-charging = %percentage%%

; Available tokens:
;   %percentage% (default) - is set to 100 if full-at is reached
;   %percentage_raw%
;   %time%
;   %consumption% (shows current discharge rate in watts)
; label-discharging = Discharging %percentage%%
label-discharging = %percentage%%

; Available tokens:
;   %percentage% (default) - is set to 100 if full-at is reached
;   %percentage_raw%
label-full = Fully charged

; Available tokens:
;   %percentage% (default) - is set to 100 if full-at is reached
;   %percentage_raw%
;   %time%
;   %consumption% (shows current discharge rate in watts)
; New in version 3.6.0
label-low = BATTERY LOW

; Only applies if <ramp-capacity> is used
ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

; Only applies if <bar-capacity> is used
bar-capacity-width = 10

; Only applies if <animation-charging> is used
animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
; Framerate in milliseconds
animation-charging-framerate = 750

; Only applies if <animation-discharging> is used
animation-discharging-0 = ÔČÄ
animation-discharging-1 = ÔČĀ
animation-discharging-2 = ÔČā
animation-discharging-3 = ÔČÉ
animation-discharging-4 = ÔČĄ
; Framerate in milliseconds
animation-discharging-framerate = 500

ramp-capacity-foreground = ${colors.primary}
animation-charging-foreground = ${colors.primary}
animation-discharging-foreground = ${colors.primary}
; Only applies if <animation-low> is used
; New in version 3.6.0
animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200

[module/pulseaudio]
type = internal/pulseaudio

; Sink to be used, if it exists (find using `pacmd list-sinks`, name field)
; If not, uses default sink
; sink = alsa_output.pci-0000_12_00.3.analog-stereo

; Use PA_VOLUME_UI_MAX (~153%) if true, or PA_VOLUME_NORM (100%) if false
; Default: true
use-ui-max = true

; Interval for volume increase/decrease (in percent points)
; Default: 5
interval = 5

; Reverses the increment/decrement on scroll event. Set this to true if you are
; using natural scrolling option on your touchpad.
; New in version 3.7.0
; Default: false
reverse-scroll = true

; Available tags:
;   <label-volume> (default)
;   <ramp-volume>
;   <bar-volume>
format-volume = <ramp-volume> <label-volume>

; Available tags:
;   <label-muted> (default)
;   <ramp-volume>
;   <bar-volume>
;format-muted = <label-muted>

; Available tokens:
;   %percentage% (default)
;   %decibels%
;label-volume = %percentage%%

; Available tokens:
;   %percentage% (default)
;   %decibels%
label-muted = ÓĽ® muted
label-muted-foreground = #666

; Only applies if <ramp-volume> is used
ramp-volume-0 = ÔÄ¶
ramp-volume-1 = ÔÄß
ramp-volume-2 = ÔÄ®

; Right and Middle click
click-right = pavucontrol
; click-middle = 
ramp-volume-foreground = ${colors.primary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÔÉá "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôíľ "
format-prefix-foreground = ${colors.primary}
label = %percentage:1%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock
format-prefix = ""
format-prefix-foreground = ${colors.primary}
label-layout = %layout%
label-indicator-on-capslock = CL
label-indicator-on-capslock-foreground = ${colors.yellow}

[module/wlan]
inherit = network-base
interface-type = wireless
interval = 10
format-connected = <ramp-signal> <label-connected>
label-connected = %essid% %downspeed%
label-connected-foreground = ${colors.yellow}

ramp-signal-0 = ůį§Į
ramp-signal-1 = ůį§ü
ramp-signal-2 = ůį§Ę
ramp-signal-3 = ůį§•
ramp-signal-4 = ůį§®

ramp-signal-foreground = ${colors.primary}


[module/downspeed]
inherit = network-base
interface-type = wireless
label-connected = %downspeed% 

[module/timer]
type = custom/script

exec = ~/scripts/polybar-timer.sh tail 'ÔČĎ' 1
tail = true

click-left = ~/scripts/polybar-timer.sh new 25 'ÔČĎ' 'Paused' 'notify-send "Session finished"' ; ~/scripts/polybar-timer.sh update %pid%
click-middle = ~/scripts/polybar-timer.sh cancel ; ~/scripts/polybar-timer.sh update %pid%
click-right = ~/scripts/polybar-timer.sh togglepause ; ~/scripts/polybar-timer.sh update %pid%
scroll-up = ~/scripts/polybar-timer.sh increase 60 || ~/scripts/polybar-timer.sh new 1 'ÔČĎ' 'PAUSED' 'notify-send -u critical "Timer expired."' ; ~/scripts/polybar-timer.sh update %pid%
scroll-down = ~/scripts/polybar-timer.sh increase -60 ; ~/scripts/polybar-timer.sh update %pid%
label-foreground = ${colors.yellow}


[module/date]
type = internal/date
interval = 1
date = %H:%M:%S
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
; label-foreground = ${colors.primary}
label-foreground = ${colors.primary}

[module/zeit]
type = custom/script
label = Zeit: %output%
exec =  zeit
interval = 1

[module/zeit-today]
type = custom/script
label = Todays work: %output%
exec =  zeit project sinom | awk '{print $5}' | tr -cd '0-9hms'

interval = 1
[module/player-online]
type = custom/script
label = Online %output%/20
exec = ssh contabo 'cd minecraft-server && docker compose exec -it server rcon-cli list' | awk '{print $3}'
interval = 60

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
